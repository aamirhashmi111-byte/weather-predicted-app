<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #3c4043;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #8ab4f8;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid #5f6368;
            color: #e8eaed;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .search-wrap {
            display: flex;
            gap: 10px;
            padding: 20px 24px 0;
            max-width: 680px;
            margin: 0 auto;
        }

        .search-wrap input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background: #303134;
            color: #e8eaed;
            font-size: 15px;
            outline: none;
        }

        .search-wrap input:focus {
            border-color: #8ab4f8;
        }

        .search-wrap input::placeholder {
            color: #9aa0a6;
        }

        .search-wrap button {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            background: #8ab4f8;
            color: #202124;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .history {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 12px 24px;
            max-width: 680px;
            margin: 0 auto;
        }

        .hist-tag {
            background: #303134;
            border: 1px solid #5f6368;
            color: #e8eaed;
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }

        .hist-tag:hover {
            background: #3c4043;
        }

        .main {
            max-width: 680px;
            margin: 0 auto;
            padding: 16px 24px;
        }

        .top-card {
            background: #303134;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 12px;
        }

        .city-time-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .city-txt {
            font-size: 24px;
            font-weight: 500;
        }

        .time-txt {
            font-size: 13px;
            color: #9aa0a6;
            text-align: right;
            line-height: 1.6;
        }

        .weather-main-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .big-icon {
            font-size: 80px;
            line-height: 1;
        }

        .temp-block {}

        .temp-num {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
        }

        .temp-feel {
            font-size: 14px;
            color: #9aa0a6;
            margin-top: 4px;
        }

        .condition-txt {
            font-size: 16px;
            color: #e8eaed;
            margin-top: 2px;
        }

        .meta-row {
            display: flex;
            gap: 0;
            border-top: 1px solid #3c4043;
            padding-top: 16px;
        }

        .meta-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 0 12px;
            border-right: 1px solid #3c4043;
        }

        .meta-item:first-child {
            padding-left: 0;
        }

        .meta-item:last-child {
            border-right: none;
        }

        .meta-label {
            font-size: 12px;
            color: #9aa0a6;
        }

        .meta-val {
            font-size: 15px;
            font-weight: 500;
            color: #e8eaed;
        }

        .hourly-card {
            background: #303134;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .section-label {
            font-size: 12px;
            color: #9aa0a6;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .hourly-scroll {
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .hourly-items {
            display: flex;
            gap: 4px;
            min-width: max-content;
        }

        .hour-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            border-radius: 12px;
            min-width: 60px;
        }

        .hour-item.now {
            background: #3c4043;
        }

        .hour-time {
            font-size: 12px;
            color: #9aa0a6;
        }

        .hour-icon {
            font-size: 20px;
        }

        .hour-temp {
            font-size: 14px;
            font-weight: 500;
        }

        .weekly-card {
            background: #303134;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .weekly-header {
            padding: 16px 20px 8px;
            border-bottom: 1px solid #3c4043;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-badge {
            background: #1a3c5e;
            color: #8ab4f8;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .week-row {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #3c4043;
            gap: 12px;
        }

        .week-row:last-child {
            border-bottom: none;
        }

        .week-row:hover {
            background: #3c4043;
        }

        .week-day {
            font-size: 14px;
            color: #e8eaed;
            width: 90px;
        }

        .week-icon {
            font-size: 22px;
            width: 32px;
            text-align: center;
        }

        .week-rain {
            font-size: 12px;
            color: #8ab4f8;
            width: 44px;
        }

        .week-bar-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .week-min {
            font-size: 13px;
            color: #9aa0a6;
            min-width: 32px;
            text-align: right;
        }

        .week-bar {
            flex: 1;
            height: 4px;
            background: #3c4043;
            border-radius: 2px;
            position: relative;
        }

        .week-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #fbbc04, #ea4335);
        }

        .week-max {
            font-size: 13px;
            font-weight: 500;
            color: #e8eaed;
            min-width: 32px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8ab4f8;
            font-size: 16px;
            display: none;
        }

        .error-box {
            background: #3c1f1f;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            color: #f28b82;
            margin-top: 12px;
        }

        .hidden {
            display: none !important;
        }

        body.light {
            background: #f1f3f4;
            color: #202124;
        }

        body.light .top-card,
        body.light .hourly-card,
        body.light .weekly-card,
        body.light .hour-item.now {
            background: #fff;
        }

        body.light .meta-row,
        body.light .week-row,
        body.light .weekly-header,
        body.light .week-bar {
            border-color: #e0e0e0;
        }

        body.light .week-row:hover {
            background: #f5f5f5;
        }

        body.light .city-txt,
        body.light .temp-num,
        body.light .meta-val,
        body.light .week-day,
        body.light .week-max,
        body.light .hour-temp {
            color: #202124;
        }

        body.light .meta-label,
        body.light .time-txt,
        body.light .hour-time,
        body.light .week-min,
        body.light .condition-txt,
        body.light .temp-feel {
            color: #5f6368;
        }

        body.light .search-wrap input {
            background: #fff;
            color: #202124;
            border-color: #dadce0;
        }

        body.light .hist-tag {
            background: #fff;
            color: #202124;
            border-color: #dadce0;
        }

        body.light .theme-btn {
            color: #202124;
            border-color: #dadce0;
        }

        body.light .logo {
            color: #1a73e8;
        }

        body.light .search-wrap button {
            background: #1a73e8;
        }

        body.light .week-bar {
            background: #e0e0e0;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">Weather AI</div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Light Mode</button>
    </div>

    <div class="search-wrap">
        <input type="text" id="cityInput" placeholder="Type Location(place)..."
            onkeypress="if(event.key==='Enter') predict()" />
        <button onclick="predict()">Search</button>
    </div>

    <div class="history" id="historyDiv"></div>
    <div class="loading" id="loading">Weather checking...</div>
    <div id="errorDiv"></div>

    <div class="main hidden" id="result">

        <div class="top-card">
            <div class="city-time-row">
                <div class="city-txt" id="cityTxt"></div>
                <div class="time-txt" id="timeTxt"></div>
            </div>
            <div class="weather-main-row">
                <div class="big-icon" id="bigIcon">☀️</div>
                <div class="temp-block">
                    <div class="temp-num"><span id="tempNum"></span>°C</div>
                    <div class="condition-txt" id="condTxt"></div>
                    <div class="temp-feel" id="tempFeel"></div>
                </div>
            </div>
            <div class="meta-row">
                <div class="meta-item">
                    <span class="meta-label">Precipitation</span>
                    <span class="meta-val" id="metaRain"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Humidity</span>
                    <span class="meta-val" id="metaHum"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Wind</span>
                    <span class="meta-val" id="metaWind"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Min / Max</span>
                    <span class="meta-val" id="metaMinMax"></span>
                </div>
            </div>
        </div>

        <div class="hourly-card">
            <div class="section-label">Hourly Forecast</div>
            <div class="hourly-scroll">
                <div class="hourly-items" id="hourlyItems"></div>
            </div>
        </div>

        <div class="weekly-card">
            <div class="weekly-header">
                <span class="section-label" style="margin:0">7-Day Forecast</span>
                <span class="ai-badge">AI Predicted</span>
            </div>
            <div id="weeklyRows"></div>
        </div>

    </div>

    <script>
        let isLight = false;
        let cityHistory = JSON.parse(localStorage.getItem('wh2') || '[]');

        function toggleTheme() {
            isLight = !isLight;
            document.body.classList.toggle('light', isLight);
            document.getElementById('themeBtn').textContent = isLight ? 'Dark Mode' : 'Light Mode';
        }

        function getIcon(temp, code) {
            if (code !== undefined) {
                if (code === 0) return isNight() ? '🌙' : '☀️';
                if (code <= 2) return '⛅';
                if (code === 3) return '☁️';
                if (code <= 51) return '🌦️';
                if (code <= 67) return '🌧️';
                if (code <= 77) return '❄️';
                return '⛈️';
            }
            if (temp >= 35) return '🌡️';
            if (temp >= 28) return isNight() ? '🌙' : '☀️';
            if (temp >= 18) return '⛅';
            if (temp >= 8) return '🌥️';
            return '❄️';
        }

        function isNight() {
            const h = new Date().getHours();
            return h >= 20 || h < 6;
        }

        function getCondition(code) {
            if (code === 0) return isNight() ? 'Clear Night' : 'Sunny';
            if (code <= 2) return 'Partly Cloudy';
            if (code === 3) return 'Cloudy';
            if (code <= 51) return 'Drizzle';
            if (code <= 67) return 'Rainy';
            if (code <= 77) return 'Snowy';
            return 'Thunderstorm';
        }

        function getHourIcon(temp) {
            const h = new Date().getHours();
            if (temp >= 30) return '☀️';
            if (temp >= 20) return '⛅';
            if (temp >= 10) return '🌥️';
            return '❄️';
        }

        function renderHistory() {
            document.getElementById('historyDiv').innerHTML =
                cityHistory.slice(-5).reverse()
                    .map(c => `<span class="hist-tag" onclick="quickSearch('${c}')">${c}</span>`)
                    .join('');
        }

        function quickSearch(city) {
            document.getElementById('cityInput').value = city;
            predict();
        }

        function saveHistory(city) {
            cityHistory = cityHistory.filter(c => c.toLowerCase() !== city.toLowerCase());
            cityHistory.push(city);
            if (cityHistory.length > 5) cityHistory.shift();
            localStorage.setItem('wh2', JSON.stringify(cityHistory));
            renderHistory();
        }

        function getNow() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const h = now.getHours();
            const m = now.getMinutes().toString().padStart(2, '0');
            const ampm = h >= 12 ? 'pm' : 'am';
            const h12 = h % 12 || 12;
            return `${days[now.getDay()]}, ${h12}:${m} ${ampm}\n${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        async function predict() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.add('hidden');
            document.getElementById('errorDiv').innerHTML = '';

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city })
                });
                const d = await res.json();

                if (d.error) {
                    document.getElementById('errorDiv').innerHTML = `<div class="error-box">${d.error}</div>`;
                    return;
                }

                saveHistory(d.city);

                document.getElementById('cityTxt').textContent = d.city;
                document.getElementById('timeTxt').textContent = getNow();
                document.getElementById('tempNum').textContent = d.current_temp;
                document.getElementById('bigIcon').textContent = getIcon(d.current_temp, d.weathercode);
                document.getElementById('condTxt').textContent = getCondition(d.weathercode);
                document.getElementById('tempFeel').textContent = `Min: ${d.current_min}°C`;
                document.getElementById('metaRain').textContent = (d.rain_chance[0] || 0) + '%';
                document.getElementById('metaHum').textContent = d.humidity + '%';
                document.getElementById('metaWind').textContent = d.wind + ' km/h';
                document.getElementById('metaMinMax').textContent = d.current_min + '° / ' + d.current_temp + '°';

                const hourlyDiv = document.getElementById('hourlyItems');
                hourlyDiv.innerHTML = '';
                const nowHour = new Date().getHours();
                d.hourly_times.forEach((t, i) => {
                    const hh = parseInt(t.split('T')[1].split(':')[0]);
                    const ampm = hh >= 12 ? 'pm' : 'am';
                    const h12 = (hh % 12 || 12) + ampm;
                    const isNow = hh === nowHour;
                    hourlyDiv.innerHTML += `
        <div class="hour-item ${isNow ? 'now' : ''}">
          <div class="hour-time">${isNow ? 'Now' : h12}</div>
          <div class="hour-icon">${getHourIcon(d.hourly_temps[i])}</div>
          <div class="hour-temp">${Math.round(d.hourly_temps[i])}°</div>
        </div>`;
                });

                const weeklyDiv = document.getElementById('weeklyRows');
                weeklyDiv.innerHTML = '';
                const allT = [...d.predictions, ...d.forecast_min];
                const gMin = Math.min(...allT);
                const gMax = Math.max(...allT);

                d.days.forEach((day, i) => {
                    const date = new Date();
                    date.setDate(date.getDate() + i + 1);
                    const dName = i === 0 ? 'Tomorrow' : dayNames[date.getDay()];
                    const left = gMax > gMin ? ((d.forecast_min[i] - gMin) / (gMax - gMin) * 80).toFixed(0) : 10;
                    const width = gMax > gMin ? Math.max(10, ((d.predictions[i] - d.forecast_min[i]) / (gMax - gMin) * 80).toFixed(0)) : 20;

                    weeklyDiv.innerHTML += `
        <div class="week-row">
          <div class="week-day">${dName}</div>
          <div class="week-icon">${getIcon(d.predictions[i])}</div>
          <div class="week-rain">🌧 ${d.rain_chance[i] || 0}%</div>
          <div class="week-bar-wrap">
            <span class="week-min">${d.forecast_min[i]}°</span>
            <div class="week-bar">
              <div class="week-fill" style="margin-left:${left}%;width:${width}%"></div>
            </div>
            <span class="week-max">${d.predictions[i]}°</span>
          </div>
        </div>`;
                });

                document.getElementById('result').classList.remove('hidden');

            } catch (err) {
                document.getElementById('errorDiv').innerHTML = `<div class="error-box">Something went wrong – try again</div>`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        renderHistory();
    </script>
</body>

</html>
